# Deployment for Neo4j graph database
apiVersion: apps/v1
kind: Deployment
metadata:
  name: neo4j-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: neo4j
  template:
    metadata:
      labels:
        app: neo4j
    spec:
      containers:
      - name: neo4j
        image: neo4j:latest
        imagePullPolicy: Never
        env:
        
        # Disable authentication
        - name: NEO4J_AUTH
          value: "none"
        
        # Disable strict config validation
        - name: NEO4J_server_config_strict__validation_enabled
          value: "false"
        ports:
        - containerPort: 7474  # HTTP interface
        - containerPort: 7687  # Bolt protocol

---

# Internal service for Neo4j access
apiVersion: v1
kind: Service
metadata:
  name: neo4j-service
spec:
  type: ClusterIP
  selector:
    app: neo4j
  ports:
  - name: http
    port: 7474
    targetPort: 7474
  - name: bolt
    port: 7687
    targetPort: 7687